baseURL = 'https://howardho-cfd.github.io/'
languageCode = "en-us"
defaultContentLanguage = "en"
title = "Dr. Howard Haonan Ho"
theme = "blowfish"
enableEmoji = true

[about]
  layout = "page"

# Tell KaTeX engine to accept single $ for inline math
[katex]
  delimiters = [
    { left = "$$", right = "$$", display = true },
    { left = "$", right = "$", display = false },
    { left = "\\(", right = "\\)", display = false },
    { left = "\\[", right = "\\]", display = true }
  ]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # Allows custom inline CSS / spans in Markdown